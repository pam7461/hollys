<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="./favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./css/bxslider.css">

    <title>할리스</title>
    <style>
        @font-face {
            font-family:'NotoSansKR';
            src: url(./fonts/NotoSansKR.ttf);
        }
        @font-face {
            font-family:'Roboto';
            src: url(./fonts/Roboto-100.ttf);
            font-weight:100;
        }
        @font-face {
            font-family:'Roboto';
            src: url(./fonts/Roboto-300.ttf);
            font-weight:300
        }
        @font-face {
            font-family:'Roboto';
            src: url(./fonts/Roboto-400.ttf);
            font-weight:400
        }
        @font-face {
            font-family:'Roboto';
            src: url(./fonts/Roboto-500.ttf);
            font-weight:500
        }
        @font-face {
            font-family:'Roboto';
            src: url(./fonts/Roboto-700.ttf);
            font-weight:700
        }
        @font-face {
            font-family:'Roboto';
            src: url(./fonts/Roboto-900.ttf);
            font-weight:900
        }
        :root{
            font-family:'Roboto','NotoSansKR',sans-serif;
            font-weight:400;
            font-size:16px;
            color:#222;
        }
        .wrap{
            overflow:hidden;
        }
        .container{
            width:1196px;
            margin:0 auto;
        }
       
    </style>
</head>
<body>
    <section class="wrap">
        <header class="header">
            <div class="container">HEADER</div>
        </header>
        <section class="sec sec01 main-banner">

        </section>
        <section class="sec sec02 con-nav">

        </section>
        <section class="sec sec03 sub-banner">

        </section>
        <section class="sec sec04 notice">
            <div class="container">SEC04</div>
        </section>
        <section class="sec sec05 sns">
            <div class="container">SEC05</div>
        </section>
        <footer class="footer">
            <div class="container">FOOTER</div>
        </footer>
    </section>

    <!-- 스크립트 -->
    <script src="./js/jquery.js"></script>

        // 내부스크립트
